version: '3.8'

# ─── Shared Airflow configuration block (YAML anchor) ────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    # Core settings
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    # MinIO credentials forwarded to task containers (shared .env baked in)
    - MINIO_ENDPOINT=minio:9000
    - MINIO_ACCESS_KEY=admin
    - MINIO_SECRET_KEY=password
    - MINIO_BUCKET=landing-zone
    # Path to ingestion scripts inside the container
    - INGESTION_DIR=/opt/airflow/ingestion
    # Ensure our API libraries exist in the Airflow environment
    - _PIP_ADDITIONAL_REQUIREMENTS=pandas boto3 python-dotenv deltalake
  volumes:
    # DAGs directory
    - ./orchestration:/opt/airflow/dags
    # Ingestion scripts — available to tasks via subprocess
    - ./ingestion:/opt/airflow/ingestion
    # Persistent Airflow logs
    - airflow_logs:/opt/airflow/logs
  env_file:
    - .env

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── MinIO: S3-compatible local object store (Landing Zone) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      # Landing zone folders on the host are served as MinIO data
      - ./landing_zone:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO bucket initialiser (runs once on startup) ─────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set local http://minio:9000 admin password &&
        /usr/bin/mc mb --ignore-existing local/landing-zone &&
        echo 'Bucket landing-zone is ready.' &&
        exit 0
      "

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8080:8080"    # Airflow Web UI
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
        airflow webserver
      "
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: >
      bash -c "
        airflow db migrate &&
        airflow scheduler
      "
    depends_on:
      airflow-webserver:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Airflow Metadata DB ──────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Zookeeper: Coordination service for Kafka ───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka: Distributed streaming platform (Hot Path) ────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # ── Kafka UI: Web interface to monitor streams ──────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  airflow_logs:
    driver: local
  postgres_data:
    driver: local
